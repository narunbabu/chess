name: CI

on:
  pull_request:
    branches: [master]

jobs:
  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chess-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: chess-frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chess-backend
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, sqlite3
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHPUnit
        run: php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chess-frontend
    steps:
      - uses: actions/checkout@v4

      # ── Backend setup ──────────────────────────────────────────────────
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, sqlite3
          coverage: none

      - name: Install Composer dependencies
        run: |
          cd chess-backend
          composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare backend SQLite database
        run: |
          cd chess-backend
          touch /tmp/chess_e2e.sqlite
          php artisan key:generate --env=testing
          php artisan migrate --env=testing --force
          php artisan db:seed --env=testing --force
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite_testing
          DB_DATABASE: /tmp/chess_e2e.sqlite

      - name: Start Laravel backend
        run: |
          cd chess-backend
          php artisan serve --port=8000 --env=testing > /tmp/laravel.log 2>&1 &
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            sleep 1
          done
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite_testing
          DB_DATABASE: /tmp/chess_e2e.sqlite

      # ── Frontend setup ─────────────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: chess-frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          CI: true
          BASE_URL: http://localhost:3000
          REACT_APP_BACKEND_URL: http://localhost:8000/api

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: chess-frontend/playwright-report/
          retention-days: 14

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: chess-frontend/tests/e2e/screenshots/
          retention-days: 7

      - name: Upload backend log
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: laravel-log
          path: /tmp/laravel.log
          retention-days: 7
